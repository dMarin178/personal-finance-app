services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_app_prod_web
    ports:
      - "80:3000"
    environment:
      DATABASE_URL: "file:./prisma/prod.db"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
    volumes:
      - ./prisma:/app/prisma
    networks:
      - finance_network
    command: sh -c "npx prisma migrate deploy 2>/dev/null || true && npm run start"
    restart: always

networks:
  finance_network:
    driver: bridge
